<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>DOM Traversal & Navigation</title>
        <style>
            .bg-black {
                background-color: #111111;
                color: whitesmoke;
                font-family: Arial, Helvetica, sans-serif;
            }
        </style>
    </head>
    <body class="bg-black">
        <div class="parent">
            <div class="day">Monday</div>
            <div class="day">Tuesday</div>
            <div class="day">Wednesday</div>
            <div class="day">Thursday</div>
        </div>
    </body>
    <script>
        const parent = document.querySelector(".parent")
        console.log(parent)
        // <div class="parent"> ... </div>

        console.log(parent.children)
        // HTMLCollection(4) [div.day, div.day, div.day, div.day]
        
        console.log(parent.children[1]); // <div class="day">Tuesday</div>
        console.log(parent.children[1].innerHTML); // Tuesday
        
        for (let i = 0; i < parent.children.length; i++) {
            console.log(parent.children[i].innerHTML);
        }
        
        parent.children[1].style.color = "orange"
        console.log(parent.firstElementChild)
        // <div class="day">Monday</div>
        console.log(parent.lastElementChild)
        // <div class="day">Thursday</div>

        // Better to store frequently-used elements in variables to avoid re-querying.
        // So, we store element of our interest in a variable.

        const dayOne = document.querySelector(".day")
        console.log(dayOne); 
        // <div class="day">Monday</div>
        
        console.log(dayOne.parentElement); 
        // <div class="parent">...</div>

        console.log(dayOne.nextElementSibling); 
        // <div class="day" style="color: orange;">Tuesday</div>

        console.log("NODES: ", parent.childNodes);
        // NodeList(9) [text, div.day, text, div.day, text, div.day, text, div.day, text]
        
    </script>
</html>
